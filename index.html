<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Süper Mario: 1 GB Animasyon Edisyonu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Press Start 2P', cursive; touch-action: none; }
        canvas { display: block; image-rendering: pixelated; }
        
        #ui { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-around; color: #fff; font-size: 12px; z-index: 10; pointer-events: none; text-shadow: 2px 2px #ff0000; }

        /* AKILLI TAHTA DEV KONTROLLER */
        .controls { position: fixed; bottom: 0; width: 100%; height: 200px; display: flex; justify-content: space-between; padding: 20px; box-sizing: border-box; z-index: 100; pointer-events: none; }
        .btn { 
            width: 110px; height: 110px; background: rgba(255,255,255,0.1); 
            border: 5px solid #fff; border-radius: 20px; display: flex; 
            align-items: center; justify-content: center; color: white; 
            font-size: 40px; pointer-events: auto; user-select: none;
            box-shadow: 0 8px 0 #444;
        }
        .btn:active { transform: translateY(5px); box-shadow: none; background: rgba(255,255,0,0.3); }
        #jump { width: 220px; height: 130px; background: #2ecc71; box-shadow: 0 8px 0 #27ae60; }
    </style>
</head>
<body>

<div id="ui">
    <div>MESAFE: <span id="dist">0</span>m</div>
    <div>ÖLÜM: <span id="lv">0</span></div>
    <div>CANAVAR TİPİ: <span id="etype">RADİKAL</span></div>
</div>

<div class="controls">
    <div style="display:flex; gap:25px;">
        <div class="btn" id="left">◀</div>
        <div class="btn" id="right">▶</div>
    </div>
    <div class="btn" id="jump">ZIPLA!</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;

// --- FİZİK VE DÜNYA ---
const config = { gravity: 1.1, accel: 0.6, friction: 0.85, jumpForce: -23, maxSpeed: 9 };
let deaths = 0, camX = 0, frameCount = 0;
const keys = { a: false, d: false, w: false };

const worldSize = 150000; // Devasa harita
const platforms = [];
const enemies = [];
const stars = [];

// Harita Üretimi
function init() {
    for(let i=0; i<200; i++) stars.push({x: Math.random()*W, y: Math.random()*H, s: Math.random()*2});
    
    platforms.push({x: 0, y: H-80, w: 1200, h: 80, c: '#444'});
    for(let i=1200; i < worldSize; i += 450) {
        let py = H - 180 - (Math.random() * 320);
        let pw = 100 + (Math.random() * 150);
        platforms.push({x: i, y: py, w: pw, h: 40, c: `hsl(${i%360}, 30%, 40%)`});

        // 100 Çeşit Canavar (Renk, Boyut ve Hız varyasyonları)
        enemies.push({
            x: i + 20, y: py - 60,
            w: 30 + (Math.random()*40), h: 30 + (Math.random()*40),
            vx: (2 + Math.random()*5) * (Math.random() > 0.5 ? 1 : -1),
            color: `hsl(${Math.random()*360}, 80%, 50%)`,
            startX: i, range: pw - 40, dead: false
        });
    }
}
init();

const mario = {
    x: 150, y: H-300, vx: 0, vy: 0, w: 40, h: 70,
    ground: false, dir: 1, 
    legAngle: 0, armAngle: 0, isBlinking: false
};

function drawMario(x, y) {
    frameCount++;
    // Animasyon hesaplama
    if (Math.abs(mario.vx) > 0.5 && mario.ground) {
        mario.legAngle = Math.sin(frameCount * 0.2) * 15;
        mario.armAngle = Math.cos(frameCount * 0.2) * 20;
    } else {
        mario.legAngle = 0;
        mario.armAngle = 0;
    }
    mario.isBlinking = frameCount % 150 < 10;

    ctx.save();
    ctx.translate(x + (mario.dir === -1 ? mario.w : 0), y);
    if(mario.dir === -1) ctx.scale(-1, 1);

    // 1. Ayaklar (Yürüme animasyonu)
    ctx.fillStyle = '#4a2700';
    ctx.fillRect(5 + mario.legAngle/2, mario.h - 15, 15, 15); // Sol
    ctx.fillRect(mario.w - 20 - mario.legAngle/2, mario.h - 15, 15, 15); // Sağ

    // 2. Kırmızı Tişört ve Tulum
    ctx.fillStyle = '#eb2f06'; // Tişört
    ctx.fillRect(5, 25, mario.w - 10, 30);
    ctx.fillStyle = '#273c75'; // Mavi Tulum
    ctx.fillRect(8, 40, mario.w - 16, 20);

    // 3. Kollar
    ctx.fillStyle = '#eb2f06';
    ctx.save();
    ctx.translate(mario.w/2, 35);
    ctx.rotate(mario.armAngle * Math.PI / 180);
    ctx.fillRect(-5, 0, 10, 20); // Kol
    ctx.restore();

    // 4. Kafa ve Ten
    ctx.fillStyle = '#ffccac';
    ctx.fillRect(8, 0, mario.w - 16, 28);

    // 5. Göz ve Bıyık (Animasyonlu)
    if(!mario.isBlinking) {
        ctx.fillStyle = '#000';
        ctx.fillRect(mario.w - 18, 8, 5, 8); // Göz
    }
    ctx.fillStyle = '#331a00';
    ctx.fillRect(mario.w - 15, 18, 12, 5); // Yakışıklı Bıyık

    // 6. Şapka
    ctx.fillStyle = '#eb2f06';
    ctx.fillRect(5, -5, mario.w - 5, 10);

    ctx.restore();
}

function update() {
    if(keys.a) { mario.vx -= config.accel; mario.dir = -1; }
    else if(keys.d) { mario.vx += config.accel; mario.dir = 1; }
    else { mario.vx *= config.friction; }

    if(keys.w && mario.ground) { mario.vy = config.jumpForce; mario.ground = false; }
    mario.vy += config.gravity;
    
    mario.x += mario.vx;
    mario.y += mario.vy;

    // Çarpışmalar
    mario.ground = false;
    platforms.forEach(p => {
        if(mario.x + mario.w > p.x && mario.x < p.x + p.w && 
           mario.y + mario.h > p.y && mario.y + mario.h < p.y + p.h + mario.vy && mario.vy >= 0) {
            mario.y = p.y - mario.h; mario.vy = 0; mario.ground = true;
        }
    });

    enemies.forEach(e => {
        if(e.dead) return;
        e.x += e.vx;
        if(e.x < e.startX || e.x > e.startX + e.range) e.vx *= -1;

        if(mario.x + mario.w > e.x && mario.x < e.x + e.w && 
           mario.y + mario.h > e.y && mario.y < e.y + e.h) {
            if(mario.vy > 5) { e.dead = true; mario.vy = -18; }
            else { die(); }
        }
    });

    if(mario.y > H + 100) die();
    camX += (mario.x - camX - W/4) * 0.1;

    // UI Güncelleme
    document.getElementById('dist').innerText = Math.floor(mario.x / 20);
    document.getElementById('lv').innerText = deaths;
}

function die() {
    deaths++;
    mario.x = Math.max(100, mario.x - 600);
    mario.y = H - 500;
    mario.vx = 0; mario.vy = 0;
}

function draw() {
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0,0,W,H);
    
    // Yıldızlar (Paralaks Efekti)
    ctx.fillStyle = '#fff';
    stars.forEach(s => ctx.fillRect((s.x - camX*0.1) % W, s.y, s.s, s.s));

    // Platformlar
    platforms.forEach(p => {
        if(p.x - camX < W && p.x + p.w - camX > -W) {
            ctx.fillStyle = p.c;
            ctx.fillRect(p.x - camX, p.y, p.w, p.h);
            ctx.fillStyle = 'rgba(255,255,255,0.1)';
            ctx.fillRect(p.x - camX, p.y, p.w, 5);
        }
    });

    // Canavarlar
    enemies.forEach(e => {
        if(!e.dead && e.x - camX < W && e.x + e.w - camX > -W) {
            ctx.fillStyle = e.color;
            ctx.fillRect(e.
