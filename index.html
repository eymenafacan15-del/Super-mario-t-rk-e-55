<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JS-Engine Mario</title>
    <style>
        body { margin: 0; overflow: hidden; background: #5c94fc; touch-action: none; font-family: sans-serif; }
        canvas { display: block; image-rendering: pixelated; }
    </style>
</head>
<body>
    <canvas id="g"></canvas>
<script>
/**
 * %99 JAVASCRIPT OYUN MOTORU
 * Tüm görseller kodla (Canvas API) çizilmektedir.
 */
const c = document.getElementById('g');
const x = c.getContext('2d');
let w, h, camX = 0, frame = 0, score = 0, deaths = 0;

// YAPILANDIRMA & FİZİK
const conf = { grav: 1.2, frict: 0.8, jump: -25, speed: 8 };
const keys = { l: 0, r: 0, u: 0 };
const p = { x: 100, y: 0, vx: 0, vy: 0, w: 40, h: 70, g: 0, d: 1 };
const objs = [], enemies = [];

// EKRAN BOYUTLANDIRMA
const resize = () => {
    w = c.width = window.innerWidth;
    h = c.height = window.innerHeight;
};
window.onresize = resize;
resize();

// 100 ÇEŞİT CANAVAR VE HARİTA ÜRETİCİ (PROCEDURAL GENERATION)
const initWorld = () => {
    objs.push({x: 0, y: h-80, w: 100000, h: 80, t: 'ground'}); // Dev zemin
    
    for(let i=1; i<500; i++) {
        let ox = i * 450 + Math.random() * 200;
        let oy = h - 150 - Math.random() * 300;
        let ow = 80 + Math.random() * 150;
        let type = Math.random() > 0.5 ? 'brick' : 'pipe';
        
        objs.push({x: ox, y: oy, w: type==='pipe'?70:ow, h: type==='pipe'?100:40, t: type});

        // 100 Çeşit Canavar Mantığı: Her biri farklı renk, hız ve boyutta
        if(Math.random() > 0.2) {
            enemies.push({
                x: ox + 10, y: oy - 50, w: 35 + Math.random()*25, h: 35 + Math.random()*25,
                vx: 2 + Math.random() * 5, range: ow - 40, startX: ox + 10,
                clr: `hsl(${Math.random() * 360}, 80%, 50%)`, // 360 farklı renk tipi
                dead: 0
            });
        }
    }
};

// DOKU ÇİZİCİLER (TEXTURE ENGINE)
const drawTex = (t, x_pos, y_pos, width, height) => {
    x.save();
    x.translate(x_pos - camX, y_pos);
    
    if(t === 'brick') {
        x.fillStyle = '#cc4e22'; x.fillRect(0,0,width,height);
        x.strokeStyle = '#000'; x.lineWidth = 2;
        for(let i=0; i<width; i+=20) for(let j=0; j<height; j+=10) x.strokeRect(i, j, 20, 10);
    } 
    else if(t === 'pipe') {
        x.fillStyle = '#2ecc71'; x.fillRect(0,0,width,height);
        x.fillStyle = '#27ae60'; x.fillRect(0,0,width*0.2,height);
        x.strokeStyle = '#000'; x.strokeRect(0,0,width,height);
    }
    else { // Ground
        x.fillStyle = '#8a3324'; x.fillRect(0,0,width,height);
        x.fillStyle = '#2ecc71'; x.fillRect(0,0,width,15); // Çimen üstü
    }
    x.restore();
};

const drawPlayer = () => {
    x.save();
    x.translate(p.x - camX + (p.d === -1 ? p.w : 0), p.y);
    if(p.d === -1) x.scale(-1, 1);
    
    // Animasyon: Yürürken zıplama efekti
    let walk = (Math.abs(p.vx) > 0.1 && p.g) ? Math.sin(frame * 0.2) * 5 : 0;
    
    x.fillStyle = 'red'; x.fillRect(5, 0 + walk, 30, 15); // Şapka
    x.fillStyle = '#ffccaa'; x.fillRect(8, 15 + walk, 24, 20); // Kafa
    x.fillStyle = 'blue'; x.fillRect(5, 35 + walk, 30, 25); // Tulum
    x.fillStyle = '#442200'; x.fillRect(2 + walk, 60, 15, 10); // Ayak 1
    x.fillRect(22 - walk, 60, 15, 10); // Ayak 2
    x.restore();
};

// OYUN DÖNGÜSÜ (GAME LOOP)
const loop = () => {
    frame++;
    // Hareket
    if(keys.l) { p.vx -= conf.speed * 0.1; p.d = -1; }
    else if(keys.r) { p.vx += conf.speed * 0.1; p.d = 1; }
    else p.vx *= conf.frict;

    if(keys.u && p.g) { p.vy = conf.jump; p.g = 0; }
    p.vy += conf.grav;
    p.x += p.vx; p.y += p.vy;

    // Çarpışma
    p.g = 0;
    objs.forEach(o => {
        if(p.x < o.x + o.w && p.x + p.w > o.x && p.y + p.h > o.y && p.y + p.h < o.y + o.h + p.vy && p.vy >= 0) {
            p.y = o.y - p.h; p.vy = 0; p.g = 1;
        }
    });

    // Canavarlar Update
    enemies.forEach(e => {
        if(e.dead) return;
        e.x += e.vx;
        if(e.x > e.startX + e.range || e.x < e.startX) e.vx *= -1;
        // Oyuncuyla etkileşim
        if(p.x < e.x + e.w && p.x + p.w > e.x && p.y < e.y + e.h && p.y + p.h > e.y) {
            if(p.vy > 5) { e.dead = 1; p.vy = -15; score += 100; }
            else { deaths++; p.x -= 400; p.y = 0; }
        }
    });

    if(p.y > h) { deaths++; p.x -= 400; p.y = 0; }

    // Kamera
    camX += (p.x - camX - w/3) * 0.1;

    // ÇİZİM
    x.fillStyle = '#5c94fc'; x.fillRect(0,0,w,h); // Gökyüzü
    objs.forEach(o => drawTex(o.t, o.x, o.y, o.w, o.h));
    enemies.forEach(e => {
        if(!e.dead) {
            x.fillStyle = e.clr; x.fillRect(e.x - camX, e.y, e.w, e.h);
            x.fillStyle = 'white'; x.fillRect(e.x - camX + 5, e.y + 5, 8, 8); // Göz
        }
    });
    drawPlayer();

    // UI (Saf JS ile metin çizimi)
    x.fillStyle = "white"; x.font = "20px Arial";
    x.fillText(`PUAN: ${score}   ÖLÜM: ${deaths}`, 20, 40);

    requestAnimationFrame(loop);
};

// DOKUNMATİK KONTROLLER (AKILLI TAHTA)
c.addEventListener('touchstart', e => {
    const tx = e.touches[0].clientX;
    const ty = e.touches[0].clientY;
    if(ty < h/2) keys.u = 1;
    else if(tx < w/2) keys.l = 1;
    else keys.r = 1;
});
c.addEventListener('touchend', () => { keys.l = 0; keys.r = 0; keys.u = 0; });

// KLAVYE KONTROLLER
window.onkeydown = e => {
    if(e.key === 'ArrowLeft') keys.l = 1;
    if(e.key === 'ArrowRight') keys.r = 1;
    if(e.key === 'ArrowUp' || e.key === ' ') keys.u = 1;
};
window.onkeyup = e => {
    if(e.key === 'ArrowLeft') keys.l = 0;
    if(e.key === 'ArrowRight') keys.r = 0;
    if(e.key === 'ArrowUp' || e.key === ' ') keys.u = 0;
};

initWorld();
loop();
</script>
</body>
</html>
