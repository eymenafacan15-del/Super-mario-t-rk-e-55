<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JS Pro: Mario Texture Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin: 0; overflow: hidden; background: #5c94fc; font-family: 'Press Start 2P', cursive; touch-action: none; }
        canvas { display: block; image-rendering: pixelated; }
        
        #ui { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; color: white; font-size: 14px; z-index: 10; pointer-events: none; text-shadow: 2px 2px #000; }
        
        /* AKILLI TAHTA DEV BUTONLARI */
        .controls { position: fixed; bottom: 0; width: 100%; height: 200px; display: flex; justify-content: space-between; padding: 20px; box-sizing: border-box; z-index: 100; pointer-events: none; }
        .btn { 
            width: 100px; height: 100px; background: rgba(0,0,0,0.5); 
            border: 5px solid #fff; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; color: white; 
            font-size: 30px; pointer-events: auto; user-select: none;
            box-shadow: 0 8px 0 #222;
        }
        .btn:active { transform: translateY(5px); box-shadow: none; background: rgba(255,0,0,0.4); }
        #jump { width: 180px; height: 120px; border-radius: 20px; background: #e74c3c; }
    </style>
</head>
<body>

<div id="ui">
    <div>PUAN<br><span id="score">000000</span></div>
    <div>DÜNYA<br>1-1</div>
    <div>CAN<br><span id="lives">3</span></div>
</div>

<div class="controls">
    <div style="display:flex; gap:20px;">
        <div class="btn" id="left">◀</div>
        <div class="btn" id="right">▶</div>
    </div>
    <div class="btn" id="jump">ZIPLA</div>
</div>

<canvas id="game"></canvas>

<script>
/**
 * JAVASCRIPT OYUN MOTORU AYARLARI
 */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;

const physics = { gravity: 1.2, friction: 0.8, accel: 0.8, jump: -24, limit: 9 };
let camX = 0, frame = 0, score = 0, lives = 3;
const keys = { left: false, right: false, up: false };

// --- SPRITE ÇİZİCİLER (TEXTURES) ---

const drawMario = (p) => {
    ctx.save();
    ctx.translate(p.x - camX + (p.dir === -1 ? p.w : 0), p.y);
    if(p.dir === -1) ctx.scale(-1, 1);
    
    let walk = (Math.abs(p.vx) > 0.1 && p.onGround) ? Math.sin(frame * 0.2) * 10 : 0;

    // Şapka & Kafa
    ctx.fillStyle = "#ff0000"; ctx.fillRect(5, 0, 30, 10); // Şapka
    ctx.fillStyle = "#ffccaa"; ctx.fillRect(8, 10, 24, 20); // Yüz
    ctx.fillStyle = "#000"; ctx.fillRect(25, 15, 4, 6); // Göz
    ctx.fillStyle = "#442200"; ctx.fillRect(22, 22, 12, 4); // Bıyık

    // Gövde (Tulum)
    ctx.fillStyle = "#0000ff"; ctx.fillRect(5, 30, 30, 25);
    ctx.fillStyle = "#ff0000"; ctx.fillRect(0, 30, 8, 20); // Kol sol
    ctx.fillRect(32, 30, 8, 20); // Kol sağ

    // Bacaklar
    ctx.fillStyle = "#442200";
    ctx.fillRect(5 + walk, 55, 12, 15);
    ctx.fillRect(23 - walk, 55, 12, 15);
    
    ctx.restore();
};

const drawBrick = (x, y, w, h) => {
    ctx.fillStyle = "#8a3324"; ctx.fillRect(x - camX, y, w, h);
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 1;
    for(let i=0; i<w; i+=20) {
        for(let j=0; j<h; j+=10) {
            ctx.strokeRect(x - camX + i, y + j, 20, 10);
        }
    }
};

const drawEnemy = (e) => {
    if(e.dead) return;
    ctx.fillStyle = e.color;
    ctx.fillRect(e.x - camX, e.y, e.w, e.h);
    // Gözler
    ctx.fillStyle = "#fff";
    ctx.fillRect(e.x - camX + 5, e.y + 5, 8, 8);
    ctx.fillRect(e.x - camX + e.w - 13, e.y + 5, 8, 8);
    ctx.fillStyle = "#000";
    ctx.fillRect(e.x - camX + 7, e.y + 7, 4, 4);
    ctx.fillRect(e.x - camX + e.w - 11, e.y + 7, 4, 4);
};

// --- OYUN NESNELERİ ---

const player = { x: 100, y: 100, w: 40, h: 70, vx: 0, vy: 0, onGround: false, dir: 1 };
const platforms = [];
const enemies = [];

// Harita Oluşturma (100 Çeşit Canavar İçin Döngü)
for(let i=0; i<200; i++) {
    let px = i * 400;
    let py = H - 150 - (Math.random() * 250);
    let pw = 100 + (Math.random() * 200);
    
    platforms.push({ x: px, y: py, w: pw, h: 40 });
    
    if(i > 2) {
        enemies.push({
            x: px + 20, y: py - 40, w: 40, h: 40, 
            vx: (2 + Math.random() * 4), 
            range: pw - 40, startX: px + 20,
            color: `hsl(${Math.random() * 360}, 70%, 50%)`, // 100+ Renk Varyasyonu
            dead: false
        });
    }
}
// Zemin
platforms.push({ x: 0, y: H-80, w: 100000, h: 80 });

// --- ANA DÖNGÜ (LOOP) ---

const update = () => {
    frame++;
    if(keys.left) { player.vx -= physics.accel; player.dir = -1; }
    else if(keys.right) { player.vx += physics.accel; player.dir = 1; }
    else { player.vx *= physics.friction; }

    if(keys.up && player.onGround) { player.vy = physics.jump; player.onGround = false; }
    player.vy += physics.gravity;

    player.x += player.vx;
    player.y += player.vy;

    // Platform Çarpışması
    player.onGround = false;
    platforms.forEach(p => {
        if(player.x < p.x + p.w && player.x + player.w > p.x && 
           player.y + player.h > p.y && player.y + player.h < p.y + p.h + player.vy && player.vy >= 0) {
            player.y = p.y - player.h;
            player.vy = 0;
            player.onGround = true;
        }
    });

    // Canavar Yapay Zekası ve Çarpışma
    enemies.forEach(e => {
        if(e.dead) return;
        e.x += e.vx;
        if(e.x > e.startX + e.range || e.x < e.startX) e.vx *= -1;

        if(player.x < e.x + e.w && player.x + player.w > e.x && player.y < e.y + e.h && player.y + player.h > e.y) {
            if(player.vy > 5) { // Üstüne basma
                e.dead = true;
                player.vy = -15;
                score += 100;
            } else { // Ölüm
                lives--;
                player.x -= 200;
                player.y = 0;
                if(lives <= 0) location.reload();
            }
        }
    });

    if(player.y > H) { lives--; player.x -= 300; player.y = 0; }
    
    // Kamera Takibi
    camX += (player.x - camX - W/3) * 0.1;

    document.getElementById('score').innerText = score.toString().padStart(6, '0');
    document.getElementById('lives').innerText = lives;

    draw();
    requestAnimationFrame(update);
};

const draw = () => {
    ctx.clearRect(0, 0, W, H);
    
    // Bulutlar (Basit Texture)
    ctx.fillStyle = "rgba(255,255,255,0.5)";
    for(let i=0; i<50; i++) ctx.fillRect((i*600 - camX*0.5) % (W*2), 100 + (i%5)*50, 120, 40);

    platforms.forEach(p => drawBrick(p.x, p.y, p.w, p.h));
    enemies.forEach(e => drawEnemy(e));
    drawMario(player);
};

// --- KONTROLLER ---

const setupBtn = (id, key) => {
    const el = document.getElementById(id);
    const start = (e) => { e.preventDefault(); keys[key] = true; };
    const end = (e) => { e.preventDefault(); keys[key] = false; };
    el.addEventListener('touchstart', start);
    el.addEventListener('touchend', end);
    el.addEventListener('mousedown', start);
    el.addEventListener('mouseup', end);
};

setupBtn('left', 'left');
setupBtn('right', 'right');
setupBtn('jump', 'up');

window.addEventListener('keydown', (e) => {
    if(e.code === 'ArrowLeft') keys.left = true;
    if(e.code === 'ArrowRight') keys.right = true;
    if(e.code === 'Space' || e.code === 'ArrowUp') keys.up = true;
});
window.addEventListener('keyup', (e) => {
    if(e.code === 'ArrowLeft') keys.left = false;
    if(e.code === 'ArrowRight') keys.right = false;
    if(e.code === 'Space' || e.code === 'ArrowUp') keys.up = false;
});

update();
</script>
</body>
</html>
